<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0F2530">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StoryTuner">
<title>StoryTuner · Find the story. Tell it well.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* dark ocean theme */
  --bg:#0F2530;         /* deep ocean background */
  --bg-2:#123040;
  --panel:#0C1D26;
  --card:#173A48;       /* raised card, cool teal-gray */
  --card-2:#1E4453;
  --card-line:#2C5361;
  --line:#2C5361;

  --brand:#2E85A6;      /* bright ocean teal: path, primary action (readable on dark) */
  --brand-d:#14495A;    /* deep ocean teal: pressed shadow, headers */
  --brand-l:#A9C6D8;    /* silver-blue: text, rings, icons */

  --silver:#A9C6D8;     /* silver-blue: progress, highlights */
  --silver-d:#6E9AB2;
  --seafoam:#1B4250;    /* dark seafoam: subtle fills */

  --amber:#F4B942;      /* warm gold: the only warm accent (streaks, XP, quest, celebration) */
  --amber-d:#C88F1E;

  --cream:#D7ECE9;      /* seafoam "paper" moments (was warm cream) */
  --cream-d:#A9C6D8;
  --ink:#0F2530;

  --txt:#EAF3F5;        /* near-white cool text */
  --mut:#9DB4C0;
  --dim:#6B8593;

  --good:#4FC38A;       /* correct and complete only (cool green) */
  --good-d:#2E9E6B;
  --danger:#E86A72;     /* errors only, never a theme color */

  --shadow-soft:0 14px 34px rgba(0,0,0,.42);
  --shadow-button:0 5px 0 rgba(0,0,0,.34);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:#081820;
  font-family:'Nunito',-apple-system,'SF Pro Rounded','Segoe UI',system-ui,sans-serif;
  color:var(--txt);
  font-size:16px;line-height:1.5;
  display:flex;justify-content:center;
}
#app{
  width:100%;max-width:430px;min-height:100dvh;position:relative;
  background:var(--bg);
  display:flex;flex-direction:column;
}
@media(min-width:431px){ #app{border-left:1.5px solid #163540;border-right:1.5px solid #163540} }
#page{flex:1;padding:14px 16px calc(104px + env(safe-area-inset-bottom));overflow-x:hidden}
#page.no-nav{padding-bottom:24px}

h1{font-size:1.5rem;font-weight:900;color:var(--txt);letter-spacing:-.01em}
h2{font-size:1.22rem;font-weight:900;color:var(--txt)}
h3{font-size:1rem;font-weight:900;color:var(--txt)}
p{font-size:.95rem}
.muted{color:var(--mut)}
.tiny{font-size:.8rem;color:var(--mut)}
.eyebrow{font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:.09em;color:var(--dim)}
.spread{display:flex;justify-content:space-between;align-items:center;gap:10px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ic{flex:none;display:inline-block;vertical-align:-.18em}
.mb-1{margin-bottom:6px}.mb-2{margin-bottom:10px}.mb-3{margin-bottom:14px}
.mt-2{margin-top:10px}.center{text-align:center}.fw-bold{font-weight:800}
.max-sm{max-width:320px;margin-inline:auto}

/* ---------- buttons: chunky press, clear meanings ---------- */
.btn{
  display:block;width:100%;
  font:inherit;font-weight:900;font-size:.9rem;
  text-transform:uppercase;letter-spacing:.07em;text-align:center;
  padding:14px 16px;border:0;border-radius:18px;cursor:pointer;
  transition:transform .06s,box-shadow .06s,filter .12s;
  user-select:none;
}
.btn:active{transform:translateY(4px);box-shadow:none !important}
.btn:disabled{filter:grayscale(.6) brightness(.7);cursor:default}
.btn:disabled:active{transform:none}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 5px 0 var(--brand-d)}
.btn-reward{background:var(--amber);color:#3A2A06;box-shadow:0 5px 0 var(--amber-d)}
.btn-good{background:var(--good);color:#04241A;box-shadow:0 5px 0 var(--good-d)}
.btn-secondary{background:var(--card-2);color:var(--txt);border:2px solid var(--line);box-shadow:0 4px 0 #0A1A22}
.btn-quiet{background:transparent;color:var(--mut);border:none;box-shadow:none}
.btn-danger{background:transparent;color:var(--danger);border:2px solid #5A3A3E;box-shadow:0 4px 0 #5A3A3E}
.btn-sm{width:auto;padding:9px 14px;border-radius:13px;font-size:.74rem}
.btn-secondary.btn-sm{box-shadow:0 3px 0 #0A1A22}
.btn-danger.btn-sm{box-shadow:0 3px 0 #5A3A3E}
.btn:focus-visible,.opt:focus-visible,.pnode:focus-visible,.navbtn:focus-visible,.ctx-card:focus-visible{outline:3px solid var(--brand-l);outline-offset:2px}

/* ---------- card system ---------- */
.card{
  background:var(--card);border:1.5px solid rgba(255,255,255,.06);
  border-radius:22px;padding:16px;margin-bottom:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.22);
}
.hero-card{
  position:relative;overflow:hidden;
  padding:20px;border-radius:24px;margin-bottom:14px;
  background:
    radial-gradient(circle at 82% 8%, rgba(46,133,166,.34), transparent 40%),
    linear-gradient(180deg,var(--card-2),var(--card));
  border:1.5px solid var(--card-line);
  box-shadow:var(--shadow-soft);
}
.paper-card{
  background:var(--cream);color:var(--ink);
  border:2px solid var(--cream-d);border-radius:22px;
  box-shadow:0 5px 0 var(--cream-d);
  padding:18px;margin-bottom:14px;
}
.paper-card h1,.paper-card h2,.paper-card h3{color:var(--ink)}
.paper-card p{color:#183642}
.paper-card .tiny,.paper-card .muted{color:#3E5C68}
.arena-card{
  background:
    radial-gradient(circle at 50% 0%, rgba(255,178,74,.15), transparent 44%),
    #123443;
  border:2px solid #2C5361;border-radius:24px;
  box-shadow:var(--shadow-soft);
  padding:18px;margin-bottom:14px;
}
.quiet-card{
  background:rgba(255,255,255,.04);
  border:1.5px solid rgba(255,255,255,.085);
  border-radius:20px;
  padding:14px 16px;margin-bottom:14px;
}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;
  color:var(--mut);background:rgba(255,255,255,.07);
  padding:5px 10px;border-radius:10px;
}
.chip-brand{color:var(--brand-l);background:rgba(169,198,216,.16)}
.chip-amber{color:var(--amber);background:rgba(244,185,66,.15)}
.chip-good{color:var(--good);background:rgba(79,195,138,.13)}

/* ---------- top stat bar ---------- */
.statbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 2px 14px;position:sticky;top:0;z-index:6;background:var(--bg);
}
.stat-item{display:flex;align-items:center;gap:6px;font-weight:900;font-size:1.02rem}
.st-flame{color:var(--amber)} .st-flame.off{color:var(--dim)}
.st-xp{color:var(--brand-l)}
.st-story{color:var(--mut)}
.wordlogo{font-weight:900;font-size:1.1rem;color:var(--txt);letter-spacing:-.02em;display:flex;align-items:center;gap:8px;white-space:nowrap}

/* ---------- saga art ---------- */
.saga-img{display:block;background:transparent;filter:drop-shadow(0 6px 14px rgba(0,0,0,.4))}
.saga-row{display:flex;gap:12px;align-items:center;margin:6px 0 16px}
.bubble{
  background:var(--card-2);border:1.5px solid rgba(255,255,255,.07);
  border-radius:18px;border-bottom-left-radius:5px;
  padding:12px 14px;font-size:.92rem;font-weight:700;color:var(--txt);flex:1;
  box-shadow:0 6px 16px rgba(0,0,0,.2);
}
.bounce{animation:bounce .9s ease}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-9px)}55%{transform:translateY(2px)}75%{transform:translateY(-4px)}}

/* ---------- learn path ---------- */
.unit-banner{
  background:linear-gradient(180deg,#3E9BBE,var(--brand));
  border-radius:22px;box-shadow:0 5px 0 var(--brand-d);
  padding:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;
  margin:18px 0 4px;
}
.unit-banner.done-unit{background:var(--card);box-shadow:0 4px 0 #0C2029}
.unit-banner .eyebrow{color:rgba(255,255,255,.75)}
.unit-banner.done-unit .eyebrow{color:var(--dim)}
.unit-banner h2{color:#fff;font-size:1.1rem;margin-top:2px}
.unit-banner.done-unit h2{color:var(--mut)}
.unit-guide{
  flex:none;border:0;cursor:pointer;color:#fff;
  background:rgba(0,0,0,.18);border-left:2px solid rgba(255,255,255,.22);
  margin:-16px -16px -16px 0;padding:0 16px;align-self:stretch;display:flex;align-items:center;
  border-radius:0 20px 20px 0;
}
.unit-banner.done-unit .unit-guide{color:var(--dim);border-left-color:#0F2530}
.path{display:flex;flex-direction:column;align-items:center;gap:30px;padding:30px 0 14px}
.pwrap{position:relative;width:78px;height:78px}
.pnode{
  position:absolute;inset:0;border:0;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .06s;
}
.pnode:active{transform:translateY(4px)}
.pnode.locked{background:#1A3B48;box-shadow:0 6px 0 #0C2029;color:var(--dim);cursor:default}
.pnode.locked:active{transform:none}
.pnode.active{background:var(--brand);box-shadow:0 6px 0 var(--brand-d);color:#fff}
.pnode.done{background:var(--amber);box-shadow:0 6px 0 var(--amber-d);color:#4A3308}
.pring{position:absolute;inset:-11px;pointer-events:none}
.startbub{
  position:absolute;top:-48px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1.5px solid rgba(255,255,255,.12);border-radius:13px;
  color:var(--brand-l);font-size:.72rem;font-weight:900;letter-spacing:.12em;
  padding:8px 16px;white-space:nowrap;z-index:2;
  animation:hover 1.7s ease-in-out infinite;
}
.startbub::after{
  content:'';position:absolute;left:50%;bottom:-7px;transform:translateX(-50%) rotate(45deg);
  width:12px;height:12px;background:var(--panel);
  border-right:1.5px solid rgba(255,255,255,.12);border-bottom:1.5px solid rgba(255,255,255,.12);
}
@keyframes hover{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.pathnote{font-size:.72rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);text-align:center;margin-top:4px}

/* ---------- lesson screen ---------- */
.lesson-top{display:flex;align-items:center;gap:14px;margin:4px 0 22px}
.xbtn{background:none;border:0;color:var(--dim);cursor:pointer;padding:6px;display:flex}
.pbar{height:14px;background:#0C2029;border-radius:9px;overflow:hidden;flex:1;position:relative}
.pbar i{
  display:block;height:100%;background:var(--brand);border-radius:9px;
  transition:width .35s ease;min-width:0;position:relative;
}
.pbar i::after{content:'';position:absolute;left:8px;right:8px;top:3px;height:4px;border-radius:3px;background:rgba(255,255,255,.25)}
.pbar.amber i{background:var(--amber)}
.opt{
  display:block;width:100%;text-align:left;cursor:pointer;
  background:var(--card);color:var(--txt);
  font:inherit;font-weight:700;font-size:.94rem;
  border:2px solid var(--line);border-radius:16px;box-shadow:0 3px 0 #0A1A22;
  padding:14px;margin-bottom:10px;
  transition:transform .06s;
}
.opt:active{transform:translateY(3px);box-shadow:none}
.opt:disabled{cursor:default;opacity:.5}
.opt.sel-right{opacity:1;border-color:var(--good);box-shadow:0 3px 0 var(--good-d);color:var(--good);background:rgba(79,195,138,.08)}
.opt.sel-wrong{opacity:1;border-color:var(--danger);box-shadow:0 3px 0 #5A3A3E;color:var(--danger);background:rgba(232,106,114,.07)}
.opt.reveal{opacity:1;border-color:var(--good);color:var(--good)}

/* bottom feedback sheet */
.sheet{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:40;
  background:var(--panel);border-top:1.5px solid rgba(255,255,255,.1);
  border-radius:24px 24px 0 0;
  padding:18px 18px calc(16px + env(safe-area-inset-bottom));
  animation:sheetup .22s ease;box-shadow:0 -14px 40px rgba(0,0,0,.4);
}
@keyframes sheetup{from{transform:translateX(-50%) translateY(30px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
.sheet .shead{display:flex;align-items:center;gap:10px;font-size:1.12rem;font-weight:900;margin-bottom:6px}
.sheet.good .shead{color:var(--good)}
.sheet.bad .shead{color:var(--danger)}
.sheet.note .shead{color:var(--amber)}
.sheet p{font-size:.9rem;color:var(--mut);font-weight:700;margin-bottom:6px}
.sheet p b{color:var(--txt)}
.sheet .model{background:#0E2731;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:10px 12px;font-size:.88rem;color:var(--txt);font-weight:700;margin:8px 0 12px}
.field{
  width:100%;font:inherit;font-weight:700;color:var(--txt);
  background:var(--panel);border:2px solid var(--line);border-radius:16px;
  padding:12px;font-size:.95rem;
}
textarea.field{min-height:120px;resize:vertical;line-height:1.55}
.field:focus{outline:none;border-color:var(--brand-l)}
.field::placeholder{color:var(--dim)}

/* ---------- arena ---------- */
.ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ctx-card{
  background:var(--card-2);border:1.5px solid rgba(255,255,255,.07);border-radius:18px;
  box-shadow:0 4px 0 #0A1A22;
  padding:16px 12px;text-align:center;cursor:pointer;color:var(--txt);font:inherit;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  transition:transform .06s;
}
.ctx-card:active{transform:translateY(3px);box-shadow:none}
.ctx-ic{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;color:#fff}
.ctx-name{font-weight:900;font-size:.95rem;color:var(--txt)}
.timer-big{font-size:2.7rem;font-weight:900;color:var(--txt);font-variant-numeric:tabular-nums}
.rec-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:8px}
.rec-ring{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
.rec-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.rec-btn{
  width:96px;height:96px;border-radius:50%;border:0;cursor:pointer;
  background:var(--brand);color:#fff;box-shadow:0 6px 0 var(--brand-d);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font:inherit;font-weight:900;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;
  transition:transform .06s;
}
.rec-btn:active{transform:translateY(4px);box-shadow:none}
.rec-btn.live{background:var(--amber);color:#3A2A06;box-shadow:0 6px 0 var(--amber-d)}
.rec-pulse{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.16)}}
.score-num{font-size:3.1rem;font-weight:900;color:var(--txt);line-height:1}
.meter{margin-bottom:14px}
.meter-name{font-weight:900;font-size:.86rem;color:var(--txt)}
.meter-val{font-weight:900;color:var(--mut);font-size:.86rem}
.meter.weak .meter-name,.meter.weak .meter-val{color:var(--amber)}
.transcript-box{background:var(--panel);border:1.5px solid rgba(255,255,255,.08);border-radius:14px;padding:12px;font-size:.88rem;color:var(--mut);max-height:180px;overflow:auto;font-weight:700}
.reel-audio{width:100%;margin-top:10px;border-radius:12px}
.reel-title{font-weight:900;font-size:1.02rem;color:var(--txt);line-height:1.4}

/* ---------- lists, settings, misc ---------- */
.menu-item{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:var(--card);border:1.5px solid rgba(255,255,255,.06);border-radius:18px;
  color:var(--txt);font:inherit;font-weight:900;font-size:.95rem;
  padding:15px 16px;margin-bottom:10px;cursor:pointer;
  transition:transform .06s;box-shadow:0 4px 0 #0A1A22;
}
.menu-item:active{transform:translateY(3px);box-shadow:none}
.menu-item .grow{flex:1}
.menu-item .mi-ic{color:var(--mut);display:flex}
.menu-item .chev{color:var(--dim);display:flex}
.setrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-top:1.5px solid rgba(255,255,255,.07)}
.setrow:first-of-type{border-top:0}
.switch{position:relative;width:52px;height:30px;flex:none}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#0C2029;border-radius:16px;transition:.2s;cursor:pointer}
.slider::before{content:'';position:absolute;width:24px;height:24px;border-radius:50%;left:3px;top:3px;background:#7A7C88;transition:.2s}
.switch input:checked + .slider{background:var(--good)}
.switch input:checked + .slider::before{transform:translateX(22px);background:#fff}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.daycell{
  aspect-ratio:1;border-radius:11px;background:#0E2731;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:900;color:var(--dim);
}
.daycell.on{background:var(--brand);color:#fff}
.daycell.today{outline:2px solid var(--amber);outline-offset:1.5px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--card);border:1.5px solid rgba(255,255,255,.06);border-radius:18px;padding:13px 8px;text-align:center;box-shadow:0 4px 0 #0A1A22}
.stat b{display:block;font-size:1.35rem;font-weight:900;color:var(--txt)}
.stat span{font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--mut)}
.tier-table{width:100%;border-collapse:collapse;font-size:.84rem}
.tier-table th{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);padding:7px 4px;text-align:center}
.tier-table td{padding:9px 4px;border-top:1.5px solid rgba(255,255,255,.07);font-weight:700;color:var(--txt)}
.tier-table td+td{text-align:center;width:74px}
.tier-table .yes{color:var(--good);font-weight:900}
.tier-table .no{color:var(--dim);font-weight:900}
.comment{background:var(--panel);border:1.5px solid rgba(255,255,255,.07);border-radius:13px;padding:9px 12px;font-size:.85rem;margin-top:8px;color:var(--mut);font-weight:700}
.comment b{color:var(--txt)}
.landed-btn{
  background:var(--card-2);border:1.5px solid rgba(255,255,255,.08);box-shadow:0 3px 0 #0A1A22;
  border-radius:13px;padding:8px 13px;cursor:pointer;
  font:inherit;font-weight:900;font-size:.8rem;color:var(--mut);
  display:inline-flex;align-items:center;gap:7px;transition:transform .06s;
}
.landed-btn:active{transform:translateY(3px);box-shadow:none}
.landed-btn.on{color:var(--amber);border-color:rgba(244,185,66,.45)}
.back-link{
  background:none;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  color:var(--dim);font:inherit;font-weight:900;font-size:.74rem;text-transform:uppercase;letter-spacing:.08em;
  padding:4px 0;margin-bottom:10px;
}
.checkline{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1.5px solid #BFDDD8;font-weight:700;font-size:.92rem;color:var(--ink)}
.checkline:first-of-type{border-top:0}
.checkline .ic{color:var(--brand);margin-top:2px}
.sec-label{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.09em;color:var(--dim);margin:18px 0 10px;display:flex;align-items:center;gap:7px}

/* ---------- bottom nav with labels ---------- */
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:30;
  background:var(--bg-2);border-top:1.5px solid rgba(255,255,255,.07);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
}
.navbtn{
  background:none;border:2px solid transparent;border-radius:15px;
  padding:7px 10px;cursor:pointer;color:var(--dim);
  display:flex;flex-direction:column;align-items:center;gap:3px;
  min-width:56px;font:inherit;font-size:.65rem;font-weight:900;
  text-transform:uppercase;letter-spacing:.06em;
  transition:color .12s;
}
.navbtn.active{color:var(--brand-l);background:rgba(46,133,166,.16);border-color:rgba(46,133,166,.5)}

/* ---------- toast, splash ---------- */
.toast{
  position:fixed;bottom:calc(100px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(14px);
  background:var(--cream);color:var(--ink);font-weight:900;font-size:.84rem;
  padding:11px 18px;border-radius:15px;box-shadow:0 8px 24px rgba(0,0,0,.45);
  opacity:0;pointer-events:none;transition:.22s;z-index:60;max-width:88%;text-align:center;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#splash{
  position:fixed;inset:0;z-index:80;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .4s;
}
#splash.gone{opacity:0;pointer-events:none}
#splash .wordmark{font-size:2rem;font-weight:900;color:var(--txt);letter-spacing:-.02em}
#splash .tag{color:var(--mut);font-weight:800;font-size:.92rem}
.slidein{animation:slidein .3s ease}
@keyframes slidein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.dots{display:flex;gap:7px;justify-content:center;margin:14px 0 18px}
.dots i{width:9px;height:9px;border-radius:50%;background:#2C5361}
.dots i.on{background:var(--brand)}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
</style>

/* ---------- storage: window.storage -> localStorage -> memory ---------- */
const mem = {};
const store = {
  async get(k){
    try{ if(window.storage){ const r = await window.storage.get(k); return r ? r.value : null; } }catch(e){}
    try{ if(window.localStorage) return localStorage.getItem(k); }catch(e){}
    return (k in mem) ? mem[k] : null;
  },
  async set(k,v){
    try{ if(window.storage){ await window.storage.set(k,v); return; } }catch(e){}
    try{ if(window.localStorage){ localStorage.setItem(k,v); return; } }catch(e){}
    mem[k]=v;
  },
  async del(k){
    try{ if(window.storage){ await window.storage.delete(k); return; } }catch(e){}
    try{ if(window.localStorage){ localStorage.removeItem(k); return; } }catch(e){}
    delete mem[k];
  }
};

function freshState(){

    streak:{count:0,last:null,prev:0,history:[]},
    lessons:{}, recordings:[], arenaUses:{},
    community:[], hearts:{},
    settings:{tone:'warm',freq:'daily',aiOptIn:false}
  };
}
let S = freshState();
const SKEY='taleo-state-v2';
async function saveState(){ try{ await store.set(SKEY, JSON.stringify(S)); }catch(e){} }
async function loadState(){
  const raw = await store.get(SKEY);
  if(raw){ try{ const p=JSON.parse(raw); S=Object.assign(freshState(),p); S.settings=Object.assign({tone:'warm',freq:'daily',aiOptIn:false},p.settings||{}); }catch(e){} }
}

/* ---------- Tell It checkers (heuristic first read) ---------- */
const RX={
 fillerOpen:/^\s*("|')?\s*(so|well|basically|okay|ok|um|uh|anyway|one time|this one time)\b/i,
 trail:/(so yeah|and yeah|i guess|that is pretty much it|that's pretty much it|thats pretty much it|that is basically|that's basically|anyway)[\s.!]*$/i,
 moral:/(taught me|the moral|i learned|lesson is|what i took away)/i,
 broad:/\b(whole|entire|my childhood|that summer|that year|for years|for months|senior year|all of)\b/i,
 moment:/\b(second|seconds|moment|instant|exact|suddenly|right when|right as|the split)\b/i,
 humble:/\b(too good|too talented|too perfect|so good at)\b/i
};
const STAKE_WORDS=['want','wanted','need','needed','fear','afraid','scared','terrified','lose','lost','losing','before','only','last chance','chance','deadline','had to','about to','could not','couldn','or else','risk','one shot','out of time','worse'];
const DOUBT_WORDS=['no idea','not sure','wasn\'t sure','was not sure','doubt','doubted','afraid','scared','worried','panick','might fail','could fail','did not know','didn\'t know','certain i had','sure i had'];
const SENSE_WORDS=['smell','smelled','smelt','scent','sound','sounded','heard','hum','buzz','taste','tasted','felt like','sticky','rough','cold','warm','hot','burnt','burning','creak','echo','like '];
const VAGUE_ADJ=['messy','dirty','loud','busy','nice','bad','weird','crazy','cluttered','really','very','pretty','kind of','sort of','a lot of','stuff','gross'];
const PRO_WORDS=['skill','decision','deadline','team','led','lead','pressure','problem','result','learned to','handled','responsib','project','fixed','point','value'];
const KILL_NAMES=['setup','stakes','wandering','middle','ending','moral'];
function countHits(t,list){ const s=' '+t.toLowerCase()+' '; return list.filter(w=>s.includes(w)).length; }
function sentencesOf(t){ return t.split(/[.!?]+/).map(x=>x.trim()).filter(Boolean); }
function tellWorking(t){
  if(countHits(t,STAKE_WORDS)>0) return 'There is a real stake in it already.';
  if(countHits(t,SENSE_WORDS)>0) return 'The detail puts us in the room.';
  if(!RX.fillerOpen.test(t)) return 'No throat-clearing at the start, which most people cannot resist.';
  return 'You put a real attempt down, and that is the hard part.';
}
const TELL_CHECKS={
 stakesOpen(t){
  const notes=[], sents=sentencesOf(t);
  if(countHits(t,STAKE_WORDS)===0)notes.push('Toro cannot tell what you wanted, feared, or could lose. Name the stake in plain words.');
  if(!(/\d/.test(t)||t.length>60))notes.push('It reads like a general complaint. Anchor it to one specific situation.');
  if(sents.length>3)notes.push('Keep it to two sentences. Compression is part of the drill.');
  if(RX.fillerOpen.test(t))notes.push('The first words are throat-clearing. Start inside the moment instead.');
  return {pass:notes.length===0,notes};
 },
 inAction(t){
  const notes=[];
  if(RX.fillerOpen.test(t))notes.push('Sentence one starts with setup words. Cut everything before the moment already in motion.');
  const hasSense=countHits(t,SENSE_WORDS)>0||/"|said|told|yelled|whispered/.test(t.toLowerCase());
  if(!hasSense)notes.push('No dialogue or sensory detail yet. One exact line or one physical detail drops us in faster.');
  if(countHits(t,STAKE_WORDS)===0)notes.push('There is no implied tension in the first two sentences. Hint at what is at risk.');
  return {pass:notes.length<=1,notes};
 },
 escalate(t){
  const notes=[], sents=sentencesOf(t);
  if(sents.length<2){notes.push('Write two sentences: the problem, then the problem getting worse.');return{pass:false,notes};}
  const second=sents.slice(1).join(' ').toLowerCase();
  if(!/(it|phone|that|the only|inside|in it|messages)/.test(second))notes.push('The second sentence introduces a separate problem. Make the phone problem itself get worse.');
  if(!(countHits(second,STAKE_WORDS)>0||/worse|realized|remembered|still|starting|minutes|about to/.test(second)))notes.push('The stakes did not rise. Add urgency: a deadline, a consequence, a door closing.');
  return {pass:notes.length===0,notes};
 },
 oneDetail(t){
  const notes=[], sents=sentencesOf(t);
  if(sents.length>1)notes.push('Exactly one sentence. Cut the rest.');
  const vague=VAGUE_ADJ.filter(w=>(' '+t.toLowerCase()+' ').includes(' '+w));
  if(vague.length>1)notes.push('Vague adjectives are stacking up ('+vague.slice(0,3).join(', ')+'). Trade them for one concrete image.');
  if(countHits(t,SENSE_WORDS)===0)notes.push('Toro cannot smell, hear, or feel anything yet. Use one sensory detail.');
  return {pass:notes.length===0,notes};
 },
 doubt(t){
  const notes=[];
  if(RX.humble.test(t))notes.push('That reads as false modesty, a brag wearing a disguise. Admit a real wobble instead.');
  if(countHits(t,DOUBT_WORDS)===0)notes.push('There is no genuine uncertainty here yet. What did you actually fear right before it worked?');
  return {pass:notes.length===0,notes};
 },
 beforeAfter(t){
  const notes=[], sents=sentencesOf(t);
  if(RX.moral.test(t))notes.push('You stated the lesson ("taught me", "I learned"). Cut it and let the change do the talking.');
  if(sents.length<2)notes.push('Two sentences: one for who you were at the start, one for the end.');
  if(!/\b(now|still|since|used to|by the end|these days|anymore)\b/i.test(t))notes.push('Toro cannot see the before and after. Show a behavior or belief that is different.');
  return {pass:notes.length===0,notes};
 },
 noTrail(t){
  const notes=[];
  if(RX.trail.test(t.trim()))notes.push('It trails off with filler. Delete everything after the beat that matters.');
  if(sentencesOf(t).length>2)notes.push('One closing line. Land it and stop.');
  if(t.trim().length<8)notes.push('Give the line some weight: a concrete image or a confident statement.');
  return {pass:notes.length===0,notes};
 },
 fiveSecond(t){
  const notes=[];
  if(RX.broad.test(t))notes.push('That span is too broad to tell well. Narrow to a single moment inside it.');
  if(!RX.moment.test(t)&&!/\bwhen\b/i.test(t))notes.push('Point at the seconds: "the second", "the moment", "right when".');
  if(!/\d/.test(t)&&t.split(/\s+/).length<6)notes.push('Add one concrete detail so the moment is yours and no one else\'s.');
  return {pass:notes.length===0,notes};
 },
 twoLines(t){
  const notes=[], sents=sentencesOf(t);
  if(sents.length<2)notes.push('Write both: the opening line and the closing line.');
  if(t.trim().length<20)notes.push('These are the two lines to know clearly. Write them out fully.');
  return {pass:notes.length===0,notes};
 },
 reframe(t){
  const notes=[];
  if(countHits(t,PRO_WORDS)===0)notes.push('The interview version needs to serve a clear point: a skill, a decision, a result. Name it.');
  if(t.trim().length<25)notes.push('One full sentence on what you would cut and what you would aim the story at.');
  return {pass:notes.length===0,notes};
 },
 diagnose(t){
  const notes=[];
  if(!KILL_NAMES.some(k=>t.toLowerCase().includes(k)))notes.push('Name one of the five patterns: too much setup, no stakes, wandering middle, weak ending, stated moral.');
  if(!/\b(my|first|last|when i|the part|sentence|sentences|opening|line|before)\b/i.test(t))notes.push('Point at the exact spot in your own story, not just the category.');
  return {pass:notes.length===0,notes};
 }
};

/* ---------- small helpers ---------- */
const $=s=>document.querySelector(s);
const page=$('#page');
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2200); }
function armConfirm(btn,fn){
  if(btn.dataset.armed){ delete btn.dataset.armed; fn(); return; }
  btn.dataset.armed='1'; const orig=btn.innerHTML;
  btn.innerHTML='Tap again to confirm';
  setTimeout(()=>{ if(btn.dataset.armed){ delete btn.dataset.armed; btn.innerHTML=orig; } },3500);
}
function fmtTime(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function uid(){ return 'r'+Date.now()+Math.floor(Math.random()*999); }
function addXP(n){ S.xp+=n; saveState(); }

/* streak */
function markActive(){
  const t=todayStr();
  if(!S.streak.history.includes(t)) S.streak.history.push(t);
  if(S.streak.history.length>90) S.streak.history=S.streak.history.slice(-90);
  if(S.streak.last===t){ saveState(); return; }
  if(S.streak.last && daysBetween(S.streak.last,t)===1){ S.streak.count+=1; }
  else if(!S.streak.last){ S.streak.count=1; }
  else { S.streak.prev=S.streak.count; S.streak.count=1; }
  S.streak.last=t; saveState();
}
function streakRepairAvailable(){
  if(!S.streak.last) return false;
  const gap=daysBetween(S.streak.last,todayStr());
  return gap>1 || (S.streak.prev>S.streak.count);
}
function displayStreak(){
  if(S.streak.last && daysBetween(S.streak.last,todayStr())>1) return 0;
  return S.streak.count;
}

/* lesson helpers */
function lessonState(i){
  const l=LESSONS[i];
  if(S.lessons[l.id] && S.lessons[l.id].done) return 'done';
  if(i===0) return 'open';
  const prev=LESSONS[i-1];
  return (S.lessons[prev.id] && S.lessons[prev.id].done) ? 'open' : 'locked';
}
function nextLessonIndex(){
  for(let i=0;i<LESSONS.length;i++){ if(lessonState(i)==='open') return i; }
  return -1;
}
function masteryPct(){
  const done=LESSONS.filter(l=>S.lessons[l.id]&&S.lessons[l.id].done).length;
  return Math.round(done/LESSONS.length*100);
}
function unitDone(n){ return LESSONS.filter(l=>l.unit===n).every(l=>S.lessons[l.id]&&S.lessons[l.id].done); }
function checklistUnlocked(){ return [0,1,2,3].every(unitDone); }
function statbar(){
  const st=displayStreak();
  return '<div class="statbar">'
   +'<span class="wordlogo">'+saga('neutral',28)+'StoryTuner</span>'
   +'<span style="display:flex;gap:16px">'
   +'<span class="stat-item st-flame'+(st===0?' off':'')+'" title="Day streak">'+ic('flame',20)+st+'</span>'
   +'<span class="stat-item st-xp" title="Total XP">'+ic('bolt',20)+S.xp+'</span>'
   +'<span class="stat-item st-story" title="Stories recorded">'+ic('mic',19)+S.recordings.length+'</span>'
   +'</span></div>';
}

/* ---------- learn (path) ---------- */
const NODE_OFFSETS=[0,-1.4,-2,-1.4,0,1.4,2,1.4];
function renderLearn(){
  let flat=0, html=statbar();
  UNITS.forEach(u=>{
    const lessons=LESSONS.map((l,i)=>({l,i})).filter(x=>x.l.unit===u.n);
    const uDone=unitDone(u.n);
    html+='<div class="unit-banner'+(uDone?' done-unit':'')+'">'
      +'<div><div class="eyebrow">Unit '+u.n+(uDone?' · Complete':'')+'</div><h2>'+u.title+'</h2></div>'
      +'<button class="unit-guide" data-unit="'+u.n+'" aria-label="Unit guide">'+ic('list',22)+'</button></div>';
    html+='<div class="path">';
    lessons.forEach(x=>{
      const s=lessonState(x.i);
      const off=NODE_OFFSETS[flat%NODE_OFFSETS.length]*40;
      const inner=s==='done'?ic('check',30):s==='locked'?ic('lock',26):ic('star',30);
      let ring='',bub='';
      if(s==='open'){
        const uls=lessons.map(y=>lessonState(y.i));
        const donePart=uls.filter(v=>v==='done').length/uls.length;
        const C=2*Math.PI*46;
        ring='<svg class="pring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" stroke="#123040" stroke-width="7" fill="none"/><circle cx="50" cy="50" r="46" stroke="#A9C6D8" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+(C*(1-donePart)).toFixed(1)+'"/></svg>';
        bub='<div class="startbub">START</div>';
      }
      html+='<div class="pwrap" style="transform:translateX('+off+'px)">'+ring+bub
        +'<button class="pnode '+(s==='open'?'active':s)+'" data-i="'+x.i+'" '+(s==='locked'?'disabled':'')+' aria-label="'+esc(x.l.title)+'">'+inner+'</button></div>';
      flat++;
    });
    html+='</div><div class="pathnote">'+lessons.map(x=>lessonState(x.i)).filter(s=>s==='done').length+' of '+lessons.length+' complete</div>';
    if(u.n===3&&checklistUnlocked()){
      html+='<button class="menu-item mt-2" id="pathCheck"><span class="mi-ic" style="color:var(--amber)">'+ic('clip',22)+'</span><span class="grow">Story checklist unlocked</span><span class="chev">'+ic('chev',18)+'</span></button>';
    }
  });
  page.innerHTML=html;
  page.querySelectorAll('.pnode:not(.locked)').forEach(n=>n.onclick=()=>openLesson(parseInt(n.dataset.i,10)));
  page.querySelectorAll('.unit-guide').forEach(b=>b.onclick=()=>{
    const n=parseInt(b.dataset.unit,10);
    toast('Unit '+n+': '+LESSONS.filter(l=>l.unit===n).map(l=>l.title).join(' · '));
  });
  const pc=$('#pathCheck'); if(pc) pc.onclick=()=>go('checklist');
}

/* ---------- lesson flow: read -> checks -> tell -> done ---------- */
let LS=null;
function openLesson(i){
  LS={i, li:LESSONS[i], phase:'read', step:0, correct:0};
  renderLessonStep();
}
function lessonTotalSteps(){ return 1+LS.li.mcq.length+1; }
function lessonAt(){
  if(LS.phase==='read')return 0;
  if(LS.phase==='mcq')return 1+LS.step;
  return 1+LS.li.mcq.length;
}
function lessonTop(){
  const pct=Math.round(lessonAt()/lessonTotalSteps()*100);
  return '<div class="lesson-top"><button class="xbtn" id="lQuit" aria-label="Exit lesson">'+ic('x',24)+'</button>'
    +'<div class="pbar"><i style="width:'+Math.max(4,pct)+'%"></i></div></div>';
}
function closeSheet(){ const s=$('#sheet'); if(s) s.remove(); }
function showSheet(kind,title,bodyHTML,btnLabel,btnClass,onNext){
  closeSheet();
  const d=document.createElement('div');
  d.className='sheet '+kind; d.id='sheet';
  d.innerHTML='<div class="shead">'+(kind==='good'?ic('check',22):kind==='bad'?ic('x',22):ic('spark',20))+title+'</div>'
    +bodyHTML
    +'<button class="btn '+btnClass+'" id="sheetGo">'+btnLabel+'</button>';
  document.getElementById('app').appendChild(d);
  $('#sheetGo').onclick=()=>{closeSheet();onNext();};
}
function renderLessonStep(){
  closeSheet();
  const u=UNITS[LS.li.unit];
  let body='';
  if(LS.phase==='read'){
    const c=LS.li.read;
    body='<div class="slidein"><span class="chip chip-brand">Unit '+u.n+' · '+esc(u.title)+'</span>'
      +'<div class="paper-card" style="margin-top:14px"><h2 class="mb-2">'+c.h+'</h2><p class="fw-bold">'+c.b+'</p></div>'
      +'<button class="btn btn-primary" id="lNext">Got it</button></div>';
  } else if(LS.phase==='mcq'){
    const d=LS.li.mcq[LS.step];
    body='<div class="slidein"><span class="chip chip-amber">Check '+(LS.step+1)+' of '+LS.li.mcq.length+'</span>'
      +'<h2 style="margin:14px 0 16px">'+d.q+'</h2>'
      +d.opts.map((o,oi)=>'<button class="opt" data-oi="'+oi+'">'+esc(o)+'</button>').join('')
      +'</div>';
  } else {
    const t=LS.li.tell;
    body='<div class="slidein"><span class="chip chip-good">'+ic('mic',13)+'Tell it</span>'
      +'<h2 style="margin:14px 0 10px">Now say it yourself</h2>'
      +'<p class="fw-bold mb-2">'+t.prompt+'</p>'
      +'<p class="tiny mb-2">Say it out loud first. Then type what you said, and Toro will read it against the technique.</p>'
      +'<textarea class="field" id="tellIn" placeholder="'+esc(t.ph)+'"></textarea>'
      +'<div style="height:14px"></div>'
      +'<button class="btn btn-primary" id="tellCheck">Check</button></div>';
  }
  page.innerHTML=lessonTop()+body;
  $('#lQuit').onclick=()=>go('learn');
  if(LS.phase==='read'){
    $('#lNext').onclick=()=>{LS.phase='mcq';LS.step=0;renderLessonStep();};
  } else if(LS.phase==='mcq'){
    const d=LS.li.mcq[LS.step];
    const next=()=>{ if(LS.step<LS.li.mcq.length-1){LS.step++;renderLessonStep();} else {LS.phase='tell';renderLessonStep();} };
    page.querySelectorAll('.opt').forEach(btn=>{
      btn.onclick=()=>{
        const pick=parseInt(btn.dataset.oi,10);
        page.querySelectorAll('.opt').forEach(b=>b.disabled=true);
        const right=pick===d.a;
        btn.classList.add(right?'sel-right':'sel-wrong');
        if(!right) page.querySelectorAll('.opt')[d.a].classList.add('reveal');
        if(right){LS.correct++; addXP(5);}
        showSheet(right?'good':'bad', right?'Correct · +5 XP':'Not quite',
          '<p>'+d.why+'</p>', 'Continue', right?'btn-good':'btn-primary', next);
      };
    });
  } else {
    $('#tellCheck').onclick=()=>{
      const txt=$('#tellIn').value.trim();
      if(!txt){ toast('Say it out loud, then type it here.'); return; }
      const res=TELL_CHECKS[LS.li.tell.checker](txt);
      LS.tellText=txt;
      if(res.pass){
        addXP(10);
        showSheet('good','That already feels clearer · +10 XP',
          '<p><b>Working:</b> '+tellWorking(txt)+'</p><p>One possible version, for comparison, never a script:</p><div class="model">'+esc(LS.li.tell.model)+'</div>',
          'Continue','btn-good',finishLesson);
      } else {
        showSheet('note','Toro\'s first read',
          '<p><b>Working:</b> '+tellWorking(txt)+'</p>'
          +'<p><b>One fix:</b> '+esc(res.notes[0])+'</p>'
          +'<div class="model"><span class="eyebrow" style="display:block;margin-bottom:4px">One possible version</span>'+esc(LS.li.tell.model)+'</div>',
          'Revise it','btn-primary',()=>{ const ta=$('#tellIn'); if(ta){ta.focus();} LS.tellTried=(LS.tellTried||0)+1; if(LS.tellTried>=2){ offerMoveOn(); } });
      }
    };
  }
}
function offerMoveOn(){
  if($('#tellSkip'))return;
  const btn=document.createElement('button');
  btn.className='btn btn-quiet mt-2'; btn.id='tellSkip';
  btn.textContent='Keep it and continue';
  $('#tellCheck').after(btn);
  btn.onclick=()=>{ addXP(5); finishLesson(); };
}
function finishLesson(){
  closeSheet();
  const wasUnitDone=unitDone(LS.li.unit);
  const firstTime=!(S.lessons[LS.li.id]&&S.lessons[LS.li.id].done);
  S.lessons[LS.li.id]={done:true,correct:LS.correct,of:LS.li.mcq.length};
  addXP(20); markActive(); saveState();
  if(!wasUnitDone && unitDone(LS.li.unit) && firstTime){ renderUnitComplete(); return; }
  renderLessonDone(firstTime);
}

async function startRecordingStep(){
  AR.transcript=''; AR.chunks=[]; AR.audioURL=null;
  let micOk=true;
  try{
    AR.stream=await navigator.mediaDevices.getUserMedia({audio:true});
    AR.mediaRecorder=new MediaRecorder(AR.stream);
    AR.mediaRecorder.ondataavailable=e=>{if(e.data.size)AR.chunks.push(e.data)};
  }catch(e){ micOk=false; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(micOk&&SR){
    try{
      AR.recog=new SR(); AR.recog.continuous=true; AR.recog.interimResults=false; AR.recog.lang='en-US';
      AR.recog.onresult=ev=>{ for(let i=ev.resultIndex;i<ev.results.length;i++){ if(ev.results[i].isFinal) AR.transcript+=ev.results[i][0].transcript+' '; } };
      AR.recog.onerror=()=>{};
    }catch(e){AR.recog=null;}
  }
  const T=AR.timerSel;
  page.innerHTML='<button class="back-link" id="recBack">'+ic('back',16)+'Back to prompt</button>'
   +'<div class="arena-card center"><p class="fw-bold" style="color:var(--txt)">'+esc(AR.prompt.t)+'</p>'
   +(micOk?'':'<p class="tiny mt-2" style="color:var(--amber)"><b>No microphone available.</b> You can still practice out loud with the timer. Toro will score this run on pacing only, no transcript.</p>')
   +'<div class="rec-wrap"><div class="timer-big" id="recTime">'+fmtTime(T)+'</div>'
   +'<div class="rec-ring"><svg width="180" height="180" viewBox="0 0 180 180">'
   +'<circle cx="90" cy="90" r="80" stroke="#123040" stroke-width="10" fill="none"/>'
   +'<circle id="ringArc" cx="90" cy="90" r="80" stroke="#F4B942" stroke-width="10" fill="none" stroke-linecap="round" stroke-dasharray="502.7" stroke-dashoffset="502.7"/></svg>'
   +'<button class="rec-btn" id="recBtn">'+ic('mic',30)+'<span>Record</span></button></div>'
   +'<p class="tiny" id="recHint">Take a breath. Start in the action.</p></div></div>';
  $('#recBack').onclick=()=>{cleanupRec();renderPromptStep();};
  let running=false, t0=0, tick=null;
  const btn=$('#recBtn');
  btn.onclick=()=>{
    if(!running){
      running=true; t0=Date.now();
      btn.classList.add('live','rec-pulse');
      btn.innerHTML=ic('pause',30)+'<span>Stop</span>';
      $('#recHint').textContent='Recording. Land the ending, then stop.';
      if(AR.mediaRecorder&&AR.mediaRecorder.state==='inactive'){try{AR.mediaRecorder.start();}catch(e){}}
      if(AR.recog){try{AR.recog.start();}catch(e){}}
      AR.tick=tick=setInterval(()=>{
        const timeEl=$('#recTime'), arcEl=$('#ringArc');
        if(!timeEl||!arcEl){ clearInterval(tick); return; }
        const el=Math.floor((Date.now()-t0)/1000), left=Math.max(0,T-el);
        timeEl.textContent=fmtTime(left);
        arcEl.style.strokeDashoffset=String(502.7*(1-Math.min(1,el/T)));
        if(left<=0){ stopRec(); }
      },250);
    } else stopRec();
  };
  function stopRec(){
    if(!running)return; running=false;
    clearInterval(tick);
    AR.dur=Math.max(1,Math.round((Date.now()-t0)/1000));
    const finish=()=>{ cleanupRec(false); scoreAndShow(); };
    if(AR.recog){try{AR.recog.stop();}catch(e){}}
    if(AR.mediaRecorder&&AR.mediaRecorder.state==='recording'){
      AR.mediaRecorder.onstop=()=>{
        try{
          const blob=new Blob(AR.chunks,{type:AR.mediaRecorder.mimeType||'audio/webm'});
          AR.audioURL=URL.createObjectURL(blob);
          const fr=new FileReader();
          fr.onload=()=>{AR.audioB64=(blob.size<1800000)?fr.result:null; finish();};
          fr.onerror=()=>{AR.audioB64=null;finish();};
          fr.readAsDataURL(blob);
        }catch(e){finish();}
      };
      try{AR.mediaRecorder.stop();}catch(e){finish();}
    } else finish();
  }
}
function cleanupRec(keepRecorder){
  if(!AR)return;
  if(AR.tick){clearInterval(AR.tick);AR.tick=null;}
  if(!keepRecorder&&AR.mediaRecorder&&AR.mediaRecorder.state==='recording'){AR.mediaRecorder.onstop=null;try{AR.mediaRecorder.stop();}catch(e){}}
  if(AR.stream&&(!keepRecorder||!AR.mediaRecorder||AR.mediaRecorder.state!=='recording')){AR.stream.getTracks().forEach(t=>t.stop());AR.stream=null;}
  if(AR.recog){try{AR.recog.stop();}catch(e){} AR.recog=null;}
}

/* ---------- scoring (heuristic first read, clearly labeled) ---------- */
function scoreStory(transcript,dur,target){
  const words=transcript.trim()?transcript.trim().split(/\s+/):[];
  const wc=words.length;
  const seed=(wc*7+dur*13)%17;
  const j=n=>((seed*n)%9)-4;
  let hook=62,climax=62,landing=62;
  if(wc>0){
    const first=transcript.split(/[.!?]/)[0].trim().split(/\s+/);
    const fillers=['so','um','uh','basically','okay','well','like'];
    hook=68+(first.length>=5&&first.length<=22?12:0)+(fillers.includes((first[0]||'').toLowerCase())?-14:6);
    const wpm=wc/(dur/60);
    climax=64+(wpm>=95&&wpm<=165?14:wpm<70?-10:0)+(dur>=target*0.5?8:-6);
    const lastBits=words.slice(-6).join(' ').toLowerCase();
    const trail=/(so yeah|that happened|that's it|i guess|anyway)$/.test(lastBits.trim());
    landing=66+(trail?-16:8)+(dur<target*0.35?-8:4);
  } else {
    hook=58+Math.min(14,dur/6); climax=55+Math.min(18,dur/5); landing=56+(dur>=target*0.5?10:-4);
  }
  const clamp=v=>Math.max(35,Math.min(96,Math.round(v)));
  return {hook:clamp(hook+j(3)),climax:clamp(climax+j(5)),landing:clamp(landing+j(7))};
}
function weakest(sc){ return Object.entries(sc).sort((a,b)=>a[1]-b[1])[0][0]; }
function strongest(sc){ return Object.entries(sc).sort((a,b)=>b[1]-a[1])[0][0]; }
function scoreAndShow(){
  AR.scores=scoreStory(AR.transcript||'',AR.dur,AR.timerSel);
  if(!AR.limitCounted){ S.arenaUses[todayStr()]=(S.arenaUses[todayStr()]||0)+1; AR.limitCounted=true; }
  const rec={id:uid(),date:new Date().toISOString(),ctx:AR.ctx.id,prompt:AR.prompt.t,dur:AR.dur,
             scores:AR.scores,transcript:(AR.transcript||'').trim(),shared:false,hasAudio:!!AR.audioB64,audio:AR.audioB64||null};
  if(AR.savedId){ S.recordings=S.recordings.filter(r=>r.id!==AR.savedId); }
  AR.savedId=rec.id;
  S.recordings.unshift(rec);
  addXP(15); markActive(); saveState();
  renderScore(rec);
}
function renderScore(rec){
  const sc=rec.scores, wk=weakest(sc), st=strongest(sc);
  const total=Math.round((sc.hook+sc.climax+sc.landing)/3);
  const better=AR&&AR.prevTotal!=null;
  const beat=better&&total>AR.prevTotal;
  const suggestion=REWRITES[wk][(rec.dur+rec.transcript.length)%REWRITES[wk].length];
  const praise=PRAISE[st][(rec.dur)%PRAISE[st].length];
  const names={hook:'Hook',climax:'Climax',landing:'Landing'};
  page.innerHTML='<div class="slidein">'
   +'<div style="display:flex;align-items:center;gap:16px" class="mb-3">'+saga('thinking',84)
   +'<div><div class="score-num">'+total+'</div><div class="tiny">Toro\'s first read'+(better?(beat?' · beat your last take by '+(total-AR.prevTotal):' · last take: '+AR.prevTotal):'')+'</div></div></div>'
   +'<div class="card">'
   +Object.keys(names).map(k=>'<div class="meter'+(k===wk?' weak':'')+'"><div class="spread"><span class="meter-name">'+names[k]+'</span><span class="meter-val">'+sc[k]+'</span></div><div class="pbar'+(k===wk?' amber':'')+'" style="height:11px;margin-top:5px"><i style="width:'+sc[k]+'%"></i></div></div>').join('')
   +'</div>'
   +'<div class="quiet-card"><div class="spread"><h3>'+names[st]+'</h3><span class="chip chip-good">'+ic('check',13)+'Working</span></div><p class="fw-bold mt-2" style="font-size:.9rem">'+praise+'</p></div>'
   +'<div class="card" style="border-color:rgba(244,185,66,.4)"><div class="spread"><h3>One fix: your '+names[wk].toLowerCase()+'</h3><span class="chip chip-amber">Focus</span></div><p class="fw-bold mt-2" style="font-size:.9rem">'+suggestion+'</p></div>'
   +(rec.transcript?'<div class="card"><h3 class="mb-2">Transcript</h3><div class="transcript-box">'+esc(rec.transcript)+'</div></div>':'')
   +(AR&&AR.audioURL?'<div class="card"><h3 class="mb-1">Listen back</h3><audio class="reel-audio" controls src="'+AR.audioURL+'"></audio></div>':'')
   +'<button class="btn btn-reward" id="reRec">Re-record and beat it</button>'
   +'<button class="btn btn-secondary mt-2" id="shareRec">'+(rec.shared?'Shared to community':'Share to community (opt-in)')+'</button>'
   +'<button class="btn btn-quiet mt-2" id="doneRec">Save and finish</button>'
   +'<p class="tiny center" style="margin-top:12px">Saved privately to your Story Reel. Only you can see it unless you share it.</p></div>';
  $('#reRec').onclick=()=>{AR.prevTotal=total;startRecordingStep();};
  $('#doneRec').onclick=()=>{toast('Saved to your Story Reel');go('reel');};
  $('#shareRec').onclick=()=>shareToCommunity(rec.id,()=>renderScore(rec));
}
function shareToCommunity(recId,rerender){
  const rec=S.recordings.find(r=>r.id===recId);
  if(!rec)return;
  if(!S.premium){ toast('Posting is part of StoryTuner Plus'); go('paywall'); return; }
  if(rec.shared){ toast('Already shared'); return; }
  if(!rec.transcript){ toast('No transcript to share for this one'); return; }
  rec.shared=true;
  S.community.unshift({id:'u'+rec.id,user:'You',ctx:rec.ctx,when:'just now',hearts:0,text:rec.transcript,comments:[]});
  saveState(); toast('Shared. Thanks for putting a story out there.');
  if(rerender)rerender();
}

}

   +'<h1 class="mb-1">Build a stronger story habit</h1>'
   +'<p class="muted fw-bold max-sm">StoryTuner Plus gives more practice, deeper review, and more ways to prepare stories for real situations.</p></div>'
   +(S.premium?
     '<div class="paper-card center"><b>Plus is active on this device.</b><p class="tiny mt-2">Demo build: no real payment was processed.</p></div>'
     +'<button class="btn btn-quiet" id="cancelSub">Switch back to free</button>'
    :
     '<button class="btn btn-reward" id="subM">Unlock StoryTuner Plus · $7.99/mo</button>'
     +'<button class="btn btn-secondary mt-2" id="subY">$59.99 / year · save 37%</button>'
     +'<p class="tiny center" style="margin-top:10px">Demo build: tapping activates Plus on this device without any real payment.</p>')
   +'<div class="quiet-card mt-2">'+feats.map(f=>'<div style="display:flex;gap:9px;align-items:flex-start;padding:6px 0"><span style="color:var(--good);flex:none">'+ic('check',16)+'</span><span class="fw-bold" style="font-size:.9rem">'+f+'</span></div>').join('')+'</div>'
   +'<div class="card"><div class="eyebrow mb-2">The honest table</div><table class="tier-table"><tr><th style="text-align:left">Feature</th><th>Free</th><th>Plus</th></tr>'
   +rows.map(r=>'<tr><td>'+r[0]+'</td><td>'+r[1]+'</td><td>'+r[2]+'</td></tr>').join('')
   +'</table></div>'
   +'<p class="tiny center">No locked streaks, no ransomed prompts. The free tier is a complete product.</p>';
  $('#pwBack').onclick=()=>go('more');
  const act=()=>{S.premium=true;saveState();toast('StoryTuner Plus activated (demo)');renderPaywall();};
  const m=$('#subM'),y=$('#subY'),c=$('#cancelSub');
  if(m)m.onclick=act; if(y)y.onclick=act;
  if(c)c.onclick=()=>{S.premium=false;saveState();toast('Back on the free plan');renderPaywall();};
}

/* ---------- PWA wiring ---------- */
function setupPWA(){
  try{
    if('serviceWorker' in navigator && (location.protocol==='https:'||location.hostname==='localhost')){
      const swCode="self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{e.respondWith(caches.open('taleo-v5').then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(n=>{if(e.request.method==='GET'&&n.ok)c.put(e.request,n.clone());return n;}).catch(()=>r))))});";
      try{
        const swURL=URL.createObjectURL(new Blob([swCode],{type:'text/javascript'}));
        navigator.serviceWorker.register(swURL).catch(()=>{});
      }catch(e){}
    }
    if(!SAGA_IMG.neutral) return;
    const img=new Image();
    img.onload=()=>{
      try{
        const mk=size=>{
          const c=document.createElement('canvas'); c.width=c.height=size;
          const x=c.getContext('2d');
          const rad=size*0.22;
          x.fillStyle='#14495A';
          x.beginPath();
          if(x.roundRect){ x.roundRect(0,0,size,size,rad); } else { x.rect(0,0,size,size); }
          x.fill();
          const iw=img.width||1, ih=img.height||1;
          const scale=Math.min(size*0.84/iw, size*0.84/ih);
          const dw=iw*scale, dh=ih*scale;
          x.drawImage(img,(size-dw)/2,(size-dh)/2,dw,dh);
          return c.toDataURL('image/png');
        };
        const icon192=mk(192), icon512=mk(512);
        const manifest={name:'StoryTuner',short_name:'StoryTuner',description:'Find the story. Tell it well.',
          start_url:location.href,display:'standalone',background_color:'#0F2530',theme_color:'#0F2530',
          icons:[{src:icon192,sizes:'192x192',type:'image/png'},{src:icon512,sizes:'512x512',type:'image/png'}]};
        const link=document.createElement('link'); link.rel='manifest';
        link.href='data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest));
        document.head.appendChild(link);
        const apple=document.createElement('link'); apple.rel='apple-touch-icon'; apple.href=icon192;
        document.head.appendChild(apple);
      }catch(e){}
    };
    img.src=SAGA_IMG.neutral;
  }catch(e){}
}

/* ---------- boot ---------- */
(async function init(){
  const sp=$('#splashSaga');
  if(sp&&SAGA_IMG.neutral) sp.src=SAGA_IMG.neutral;
  await loadState();
  setupPWA();
  renderNav();
  setTimeout(()=>{
    $('#splash').classList.add('gone');
    if(!S.onboarded) renderOnboarding(0);
    else go('home');
  },900);
})();
</script>
